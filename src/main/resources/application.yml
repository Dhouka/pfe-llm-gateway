server:
  port: 8080

spring:
  data:
    redis:
      host: localhost
      port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/llm-gateway
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        model: tinyllama
        options:
          temperature: 0.7
  cloud:
    gateway:
      routes: []

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.example.demo: DEBUG
    org.springframework.ai: INFO
