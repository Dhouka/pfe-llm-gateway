services:

  redis:
    image: redis:7-alpine
    container_name: gateway-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: gateway-keycloak
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set KEYCLOAK_ADMIN_PASSWORD in your environment or a .env file -- no default in source control}
      # Fixes the hostname Keycloak stamps into every token's "iss" claim to a constant
      # (localhost:8180) instead of deriving it from whatever Host header the caller
      # used to reach it. Without this, a token requested from the host (iss=localhost:8180)
      # and a gateway container validating via the internal Docker network would disagree
      # on the issuer string and every request would fail JWT validation.
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: "8180"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./keycloak/llm-gateway-realm.json:/opt/keycloak/data/import/llm-gateway-realm.json:ro
    # --import-realm loads keycloak/llm-gateway-realm.json on startup (creates the
    # llm-gateway realm with the llm-user/audit-viewer roles that RateLimiterConfig
    # requires, plus a dev-user/dev-user test account holding both roles). Keycloak
    # skips re-import automatically once the realm already exists in its DB.
    command: start-dev --import-realm
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: gateway-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  pii-service:
    build: ./pii-service
    container_name: gateway-pii-service
    ports:
      - "5001:5001"
    environment:
      PII_SERVICE_PORT: 5001
    restart: unless-stopped

  gateway:
    build: .
    container_name: gateway-app
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - keycloak
      - ollama
      - pii-service
    environment:
      # Spring Boot's relaxed env-var binding maps these directly onto
      # spring.data.redis.host / spring.ai.ollama.base-url — no extra ${...}
      # placeholders needed in application.yml for these two.
      SPRING_DATA_REDIS_HOST: redis
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      PII_SERVICE_URL: http://pii-service:5001
      # Must match what a token requester sees as Keycloak's address (KC_HOSTNAME above
      # fixes this to localhost:8180 regardless of caller) — used for "iss" validation.
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/llm-gateway
      # Where THIS container actually fetches JWKS from over the compose network —
      # see application.yml's jwk-set-uri comment for why these two differ here.
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/llm-gateway/protocol/openid-connect/certs
      AUDIT_LOG_FILE: /data/audit-log.jsonl
    volumes:
      - gateway-audit-data:/data
    restart: unless-stopped

volumes:
  ollama-data:
  gateway-audit-data:
